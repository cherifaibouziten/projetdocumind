name: DocuMind DAST ZAP

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  dast-scan:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Demarrage Backend
        working-directory: ./server
        env:
          PORT: 4000
          MONGODB_URI: mongodb://localhost:27017/documind_test
          JWT_SECRET: ci_jwt_secret
          CLIENT_URL: http://localhost:5173
          NODE_ENV: development
        run: |
          npm install
          node index.js &
          sleep 5

      - name: Demarrage Frontend
        working-directory: ./client
        run: |
          npm install
          npx --yes vite build
          npx --yes vite preview --port 5173 &
          sleep 5

      - name: Permissions ZAP
        run: chmod 777 $GITHUB_WORKSPACE

      - name: Scan ZAP
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: http://localhost:5173
          fail_action: false
