name: "DocuMind | JOB 3 - DAST : Analyse Dynamique (OWASP ZAP)"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  dast-scan:
    name: "[DAST] Analyse Dynamique OWASP ZAP"
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: "Etape 1 - Recuperation du code"
        uses: actions/checkout@v4

      - name: "Etape 2 - Installation de Node.js 20"
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: "Etape 3 - Demarrage du Backend (port 4000)"
        working-directory: ./server
        env:
          PORT: 4000
          MONGODB_URI: mongodb://localhost:27017/documind_test
          JWT_SECRET: ci_jwt_secret_for_testing_only
          CLIENT_URL: http://localhost:5173
          NODE_ENV: development
        run: |
          npm install
          node index.js &
          sleep 5

      - name: "Etape 4 - Build et demarrage du Frontend (port 5173)"
        working-directory: ./client
        run: |
          npm install
          npx --yes vite build
          npx --yes vite preview --port 5173 &
          sleep 5

      - name: "Etape 5 - Permissions pour le conteneur ZAP"
        run: chmod 777 $GITHUB_WORKSPACE

      - name: "Etape 6 - Scan OWASP ZAP"
        uses: zaproxy/action-baseline@v0.14.0
        env:
          ZAP_AUTH_HEADER: "Authorization"
          ZAP_AUTH_HEADER_VALUE: "${{ secrets.ZAP_AUTH_TOKEN }}"
          ZAP_AUTH_HEADER_SITE: "http://localhost:5173"
        with:
          target: 'http://localhost:5173'
          fail_action: false
